<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .navbar{
            display: flex;
            justify-content: space-between;
            align-items: center;

            gap: 20px;
            background-color: black;
            color: aliceblue;
        }
        .gallery{
            display: grid;
            gap: 20px;
            padding: 20px;
            grid-template-columns: 200px 200px 200px;<!-- this is to create 3 fixed columns-->
            grid-template-columns:1fr 1fr 1fr ; 3 equal columns
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">My logo</div>
        <div class="menu-links">Home | About | Contact</div>
        <div class="button">Login</div>
    </nav>

    <div class="gallery">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
        <div class="card">Project 4</div>

    </div>
</body>
</html>
